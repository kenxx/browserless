name: Publish Latest Chromium Cloakbrowser Docker Image to GitHub Container Registry

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: ./.github/workflows/docker-publish-chromium-cloakbrowser.yml
    secrets: inherit
    with:
      tag: latest
