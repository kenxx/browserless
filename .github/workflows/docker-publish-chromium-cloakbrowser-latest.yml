name: Publish Latest Chromium Cloakbrowser Docker Image to GitHub Container Registry

on:
  push:
    branches:
      - main

jobs:
  push_to_registry:
    name: Push multi-platform chromium cloakbrowser docker image to ghcr.io
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PASSWORD }}

      - name: Publish the latest Chromium Cloakbrowser image
        uses: docker/build-push-action@v7
        with:
          build-args: |
            VERSION=latest
          builder: ${{ steps.buildx.outputs.name }}
          file: ./docker/chromium-cloakbrowser/Dockerfile
          tags: |
            ghcr.io/kenxx/chromium-cloakbrowser:latest
          context: .
          push: true
          platforms: |
            linux/amd64
            linux/arm64
