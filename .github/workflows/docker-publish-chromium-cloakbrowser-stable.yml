name: Publish Semantic Version Chromium Cloakbrowser Docker Image to GitHub Container Registry

on:
  push:
    tags: [v2.*]

permissions:
  contents: read
  packages: write

jobs:
  push_to_registry:
    name: Push stable multi-platform chromium cloakbrowser docker image to ghcr.io
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish the Stable Chromium Cloakbrowser image
        uses: docker/build-push-action@v7
        with:
          build-args: |
            VERSION=${{github.ref_name}}
          builder: ${{ steps.buildx.outputs.name }}
          file: ./docker/chromium-cloakbrowser/Dockerfile
          tags: |
            ghcr.io/kenxx/chromium-cloakbrowser:${{github.ref_name}}
          context: .
          push: true
          platforms: |
            linux/amd64
            linux/arm64
