name: Chromium

on: [workflow_call]

jobs:
  Test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: ['v24.15.0']
    steps:
      - uses: actions/checkout@v6

      # use the base image from the registry instead of building it locally to save time and resources  
      # - name: Build the base layer
      #   uses: nick-fields/retry@v4
      #   with:
      #     timeout_minutes: 10
      #     max_attempts: 5
      #     retry_wait_seconds: 30
      #     command: docker build --build-arg NODE_VERSION=${{ matrix.node-version }} --build-arg APT_MIRROR=azure.archive.ubuntu.com -f ./docker/base/Dockerfile -t ghcr.io/browserless/base:${{ matrix.node-version }} .

      - name: Build the Chromium image
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: docker build --build-arg VERSION=${{ matrix.node-version }} -f ./docker/chromium-cloakbrowser/Dockerfile -t ghcr.io/kenxx/chromium-cloakbrowser:${{ matrix.node-version }} .

      - name: Test the Chromium image
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: docker run --ipc=host -e CI=true --entrypoint ./scripts/test.sh ghcr.io/kenxx/chromium-cloakbrowser:${{ matrix.node-version }}
